<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Biblioteca Digitale</title>
</head>
<body>

    <h1>Biblioteca Digitale</h1>

    <!-- Sezione: Visualizza tutti i libri -->
    <section>
        <h2>Tutti i libri</h2>
        <button id="btn-tutti-libri">Carica libri</button>
        <div id="lista-libri"></div>
    </section>

    <!-- Sezione: Inserisci un libro -->
    <section>
        <h2>Inserisci un nuovo libro</h2>
        <form id="form-inserisci">
            <input type="text" id="titolo" placeholder="Titolo" required>
            <input type="text" id="autore" placeholder="Autore" required>
            <input type="text" id="genere" placeholder="Genere" required>
            <input type="number" id="anno" placeholder="Anno" required>
            <input type="text" id="extra" placeholder="prezzo">
            <button type="submit">Inserisci</button>
        </form>
    </section>

    <!-- Sezione: Modifica libro -->
    <section>
        <h2>Modifica un libro</h2>
        <form id="form-modifica">
            <input type="text" id="id-modifica" placeholder="ID libro" required>
            <input type="text" id="titolo-mod" placeholder="Nuovo titolo">
            <input type="text" id="autore-mod" placeholder="Nuovo autore">
            <input type="text" id="genere-mod" placeholder="Nuovo genere">
            <input type="number" id="anno-mod" placeholder="Nuovo anno">
            <input type="text" id="extra-mod" placeholder="Nuovo prezzo">
            <button type="submit">Modifica</button>
        </form>
    </section>

    <!-- Sezione: Elimina libro -->
    <section>
        <h2>Elimina un libro</h2>
        <form id="form-elimina">
            <input type="text" id="id-elimina" placeholder="ID libro" required>
            <button type="submit">Elimina</button>
        </form>
    </section>

    <!-- Sezione: Elaborazioni -->
    <section>
    <h2>Elaborazioni</h2>

    <div class="elaborazione-box">
        <h3>Conteggio totale libri</h3>
        <button onclick="mostraConteggioLibri()">Aggiorna conteggio</button>
        <p id="conteggio-libri" class="risultato">Totale libri: ...</p>
    </div>

    <div class="elaborazione-box">
        <h3>Ricerca per titolo</h3>
        <form id="form-ricerca-titolo">
            <input type="text" id="titolo-ricerca" placeholder="Cerca per titolo..." required>
            <button type="submit">Cerca</button>
        </form>
        <div id="risultati-ricerca" class="risultato"></div>
    </div>

    <div class="elaborazione-box">
        <h3>Conteggio per genere</h3>
        <form id="form-conteggio-genere">
            <input type="text" id="genere-conteggio" placeholder="Inserisci un genere..." required>
            <button type="submit">Conta</button>
        </form>
        <p id="risultato-conteggio-genere" class="risultato"></p>
    </div>

    <div class="elaborazione-box">
        <h3>Libri dopo un certo anno</h3>
        <form id="form-dopo-anno">
            <input type="number" id="anno-ricerca" placeholder="Inserisci un anno..." required>
            <button type="submit">Cerca</button>
        </form>
        <div id="risultati-dopo-anno" class="risultato"></div>
    </div>

    <div class="elaborazione-box">
        <h3>Libro più recente</h3>
        <button id="btn-piu-recente">Mostra libro più recente</button>
        <div id="risultato-piu-recente" class="risultato"></div>
    </div>

    <div class="elaborazione-box">
        <h3>Ordinamento per anno</h3>
        <form id="form-ordinati-anno">
            <select id="ordine-anno" required>
                <option value="">Seleziona ordine</option>
                <option value="cre">Dal più vecchio al più recente</option>
                <option value="decre">Dal più recente al più vecchio</option>
            </select>
            <button type="submit">Ordina</button>
        </form>
        <div id="risultati-ordinati-anno" class="risultato"></div>
    </div>

    </section>


    <script src="script.js"></script>
</body>
</html>
